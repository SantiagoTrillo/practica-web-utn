<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/main.js"></script>
    <link rel="stylesheet" href="styles.css">
    <title>ABM Personas</title>
</head>
<body>
    <main>
        <section id="listado">
            <form action="">
                <h2>Formulario Datos</h2>
                <label>Filtrar Por<select name="filtro" id="filtro">
                    <option value="todos">Todos</option>
                    <opttion value="profesional">Profesional</opttion>
                    <opttion value="futbolista">Futbolista</opttion>
                </select></label>
                <label>Calcular Edad Promedio<input id="edadPromedio" readonly type="text"><button id="botonCalcular" type="button">Calcular</button></label> 
                <div>
                    <h4>Mostrar Columnas</h4>
                    <label><input type="checkbox">ID</label>
                    <label><input type="checkbox">Nombre</label>
                    <label><input type="checkbox">Apellido</label>
                    <label><input type="checkbox">Edad</label>
                    <label><input type="checkbox">Equipo</label>
                    <label><input type="checkbox">Posición</label>
                    <label><input type="checkbox">Cantidad de Goles</label>
                    <label><input type="checkbox">Título</label>
                    <label><input type="checkbox">Facultad</label>
                    <label><input type="checkbox">Año de Graduación</label>
                </div>
            </form>
            <table id="tablaPersonas">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Edad</th>
                        <th>Equipo</th>
                        <th>Posición</th>
                        <th>Cantidad de Goles</th>
                        <th>Título</th>
                        <th>Facultad</th>
                        <th>Año de Graduación</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div>
                <button id="botonAgregar" type="button">Agregar</button>
            </div>
        </section>
        <section id="ABM">
            <h2>Formulario ABM</h2>
            <form action="">
                <label>ID<input type="text"></label>
                <label>Nombre<input type="text"></label>
                <label>Apellido<input type="text"></label>
                <label>Edad<input type="text"></label>
                <label>Equipo<input type="text"></label>
                <label>Posición<input type="text"></label>
                <label>Cantidad de Goles<input type="text"></label>
                <label>Año de Graduación<input type="text"></label>
                <label>Título<input type="text"></label>
                <label>Facultad<input type="text"></label>
            </form>
            <button id="botonAlta" type="button">Alta</button>
            <button id="botonModificar" type="button">Modificar</button>
            <button id="botonEliminar" type="button">Eliminar</button>
            <button id="botonCancelar" type="button">Cancelar</button>
        </section>
    </main>
</body>
</html>
